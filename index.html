<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Wedding 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --sage: #9CA479;
      --sage-dark: #7a8360;
      --sage-light: #c5ceac;
      --cream: #faf8f3;
      --warm-white: #fffef9;
      --text: #3d3a34;
      --gold: #c9a96e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background-color: var(--cream);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Petals ─────────────────────────────────────────── */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: fall linear infinite;
    }
    .petal svg { display: block; }

    @keyframes fall {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }

    /* ── Page ────────────────────────────────────────────── */
    .landing {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      z-index: 1;
    }

    /* Decorative corner florals */
    .corner {
      position: fixed;
      width: 220px;
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
    }
    .corner-tl { top: 0; left: 0; transform: none; }
    .corner-tr { top: 0; right: 0; transform: scaleX(-1); }
    .corner-bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .corner-br { bottom: 0; right: 0; transform: scale(-1); }

    /* ── Header text ─────────────────────────────────────── */
    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      color: var(--sage-dark);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 1.1s 0.6s forwards;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      margin: 24px auto;
      opacity: 0;
      animation: fadeUp 1s 0.9s forwards;
    }
    .divider-line {
      width: 80px;
      height: 1px;
      background: var(--sage);
    }
    .divider svg { width: 22px; fill: var(--sage); }

    .date-text {
      font-style: italic;
      font-size: 1.15rem;
      color: var(--sage-dark);
      letter-spacing: 0.12em;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1s 1.1s forwards;
    }

    /* ── House photo ─────────────────────────────────────── */
    .venue-photo {
      width: min(480px, 88vw);
      border-radius: 2px;
      box-shadow: 0 8px 40px rgba(100,100,80,0.18);
      border: 6px solid var(--warm-white);
      outline: 1px solid var(--sage-light);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1s 1.3s forwards;
    }

    /* ── Enter button ────────────────────────────────────── */
    .enter-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--warm-white);
      background: var(--sage);
      border: none;
      padding: 18px 52px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.3s, transform 0.15s;
      border-radius: 1px;
      box-shadow: 0 4px 24px rgba(156,164,121,0.35);
      opacity: 0;
      animation: fadeUp 1s 1.5s forwards;
    }
    .enter-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .enter-btn:hover::before { transform: scaleX(1); }
    .enter-btn:hover { background: var(--sage-dark); transform: translateY(-2px); }
    .enter-btn:active { transform: translateY(0); }

    /* ── Modal overlay ───────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,28,24,0.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s ease;
      padding: 24px;
    }
    .modal-overlay.active { display: flex; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-box {
      background: var(--warm-white);
      border-radius: 2px;
      padding: 40px 36px 32px;
      text-align: center;
      max-width: 640px;
      width: 100%;
      position: relative;
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
      animation: popUp 0.4s cubic-bezier(.22,1,.36,1);
    }
    @keyframes popUp {
      from { transform: scale(0.88) translateY(30px); opacity: 0; }
      to   { transform: scale(1)    translateY(0);    opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--sage-dark);
      background: none;
      border: none;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-label {
      font-family: 'Great Vibes', cursive;
      font-size: 2rem;
      color: var(--sage-dark);
      margin-bottom: 20px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
      border-radius: 1px;
      overflow: hidden;
    }
    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .lol-text {
      margin-top: 18px;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--sage-dark);
      letter-spacing: 0.05em;
    }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Floral SVG (inline corner decoration) ───────────── */
  </style>
</head>
<body>

  <!-- Falling petals (JS-generated) -->

  <!-- Corner floral decorations -->
  <img class="corner corner-tl" src="https://www.transparentpng.com/thumb/flowers/GxUaVD-floral-flowers-png-clipart.png" alt="" />
  <img class="corner corner-tr" src="https://www.transparentpng.com/thumb/flowers/GxUaVD-floral-flowers-png-clipart.png" alt="" />
  <img class="corner corner-bl" src="https://www.transparentpng.com/thumb/flowers/GxUaVD-floral-flowers-png-clipart.png" alt="" />
  <img class="corner corner-br" src="https://www.transparentpng.com/thumb/flowers/GxUaVD-floral-flowers-png-clipart.png" alt="" />

  <!-- Landing content -->
  <main class="landing">
    <p class="subtitle">You are cordially invited</p>

    <h1>Welcome to Our Wedding Website!</h1>

    <div class="divider">
      <span class="divider-line"></span>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402 0-3.791 3.068-5.191 5.281-5.191 1.312 0 4.151.501 5.719 4.457 1.59-3.968 4.464-4.447 5.726-4.447 2.54 0 5.274 1.621 5.274 5.181 0 4.069-5.136 8.625-11 14.402z"/>
      </svg>
      <span class="divider-line"></span>
    </div>

    <p class="date-text">Summer 2026 &nbsp;·&nbsp; A Day to Remember</p>

    <img
      class="venue-photo"
      src="https://www.boreplace.org/_uploads/wedding/house-1.jpg"
      alt="Our beautiful venue"
    />

    <button class="enter-btn" onclick="openModal()">Click to Enter</button>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      <p class="modal-label">Surprise! 🎉</p>
      <div class="video-wrap" id="videoWrap"></div>
      <p class="lol-text">
    lol jk here's the actual link: 
    <a href="https://anjaandalexwedding-dot.github.io/wedding-website/">wedding website</a>
</p>
    </div>
  </div>

  <script>
    /* ── Modal ───────────────────────────────────────────── */
    function openModal() {
      document.getElementById('modal').classList.add('active');
      // Inject iframe synchronously inside the click handler so the browser
      // treats this as a direct user gesture — granting unmuted autoplay.
      const wrap = document.getElementById('videoWrap');
      if (!wrap.querySelector('iframe')) {
        const iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube.com/embed/xvFZjo5PgG0?si=JklaamWeaWpfIvTk&autoplay=1&mute=0';
        iframe.title = 'YouTube video player';
        iframe.frameBorder = '0';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        iframe.allowFullscreen = true;
        wrap.appendChild(iframe);
      }
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      // Nuke the iframe entirely to stop playback
      document.getElementById('videoWrap').innerHTML = '';
    }
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    /* ── Falling petals ─────────────────────────────────── */
    const PETAL_COUNT = 18;
    const colours = ['#9CA479','#c5ceac','#d4b896','#e8d5c4','#b8c49a'];

    for (let i = 0; i < PETAL_COUNT; i++) {
      const el = document.createElement('div');
      el.className = 'petal';
      const size = 10 + Math.random() * 14;
      const c = colours[Math.floor(Math.random() * colours.length)];
      el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="10" cy="10" rx="5" ry="9" fill="${c}" opacity="0.75" transform="rotate(${Math.random()*360} 10 10)"/>
      </svg>`;
      el.style.left   = Math.random() * 100 + 'vw';
      el.style.top    = '-60px';
      el.style.animationDuration  = (6 + Math.random() * 10) + 's';
      el.style.animationDelay     = (Math.random() * 12) + 's';
      document.body.appendChild(el);
    }
  </script>
</body>
</html>
