<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Video Page</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            background-color: #f4f4f4;
        }
        .video-container {
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .caption {
            font-weight: bold;
            color: #333;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>Check out this cool video below:</p>

    <div class="video-container">
        <!-- Added autoplay=1. Note: Browser may block autoplay if sound is on. -->
        <iframe 
            width="560" 
            height="315" 
            src="https://www.youtube.com/embed/xvFZjo5PgG0?autoplay=1" 
            title="YouTube video player" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <p class="caption">lol jk here's the actual link:</p>

</body>
</html>
